name: ci

# Cheap gate: build + fixture-driven tests only (no models, no hardware). Mirrors
# the ManifoldKit family's draft-skip discipline — CI runs only on a non-draft PR
# or a push to main, so a draft is a zero-CI staging area.
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Least privilege: the build/test job only reads the tree.
permissions:
  contents: read

jobs:
  build-test:
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    runs-on: macos-15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Build (incl. tests)
        run: swift build --build-tests
      - name: Test
        run: swift test
